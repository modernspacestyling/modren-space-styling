<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookings | MSS Admin</title>
    <link rel="stylesheet" href="../css/admin.css">
</head>

<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="sidebar-logo-name">Modern Space Styling</div>
                <div class="sidebar-logo-sub">Admin Panel</div>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-section-label">Main</div>
                <a class="sidebar-link" href="dashboard.html"><span class="sidebar-icon">📊</span> Dashboard</a>
                <a class="sidebar-link active" href="bookings.html"><span class="sidebar-icon">📋</span> Bookings</a>
                <a class="sidebar-link" href="inventory.html"><span class="sidebar-icon">📦</span> Inventory</a>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-section-label">Management</div>
                <a class="sidebar-link" href="pricing.html"><span class="sidebar-icon">💰</span> Pricing</a>
                <a class="sidebar-link" href="sms.html"><span class="sidebar-icon">💬</span> SMS Centre</a>
                <a class="sidebar-link" href="team.html"><span class="sidebar-icon">👥</span> Team Contacts</a>
                <a class="sidebar-link" href="agents.html"><span class="sidebar-icon">🏢</span> Agents</a>
                <a class="sidebar-link" href="logs.html"><span class="sidebar-icon">📝</span> Activity Log</a>
            </div>
            <div class="sidebar-footer">
                <a class="sidebar-link" href="../index.html" style="padding:0"><span class="sidebar-icon">🏠</span> View
                    Website</a>
                <a class="sidebar-link" href="#" onclick="Auth.logout()"
                    style="padding:0;margin-top:0.5rem;color:#F87171"><span class="sidebar-icon">🚪</span> Logout</a>
            </div>
        </aside>

        <header class="topbar">
            <div class="topbar-title">All Bookings</div>
            <div class="topbar-right">
                <div class="topbar-user">
                    <div class="user-avatar" id="userAvatar">A</div><span id="userName">Admin</span>
                </div>
            </div>
        </header>

        <main class="main-content">
            <!-- Filters -->
            <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.25rem;flex-wrap:wrap">
                <input class="search-input" id="searchInput" placeholder="Search by job#, agent, address..."
                    style="max-width:320px" oninput="renderTable()">
                <select class="f-control" id="statusFilter" style="width:180px" onchange="renderTable()">
                    <option value="">All Statuses</option>
                    <option value="pending">Pending</option>
                    <option value="confirmed">Confirmed</option>
                    <option value="on_the_way">On The Way</option>
                    <option value="arrived">Arrived</option>
                    <option value="active">Active</option>
                    <option value="pickup_ready">Pickup Ready</option>
                    <option value="closed">Closed</option>
                </select>
                <a href="../booking.html" class="ab ab-accent" target="_blank">+ New Booking</a>
            </div>

            <div class="panel">
                <div class="tbl-wrap">
                    <table class="tbl" id="bookingsTable">
                        <thead>
                            <tr>
                                <th>Job #</th>
                                <th>Agent</th>
                                <th>Agency</th>
                                <th>Address</th>
                                <th>Install Date</th>
                                <th>Rooms</th>
                                <th>Status</th>
                                <th>Countdown</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="bookingsTbody"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Job Detail Modal -->
    <div class="modal-overlay" id="jobModal"
        style="position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:2000;display:none;align-items:center;justify-content:center;padding:1.5rem">
        <div
            style="background:white;border-radius:12px;width:700px;max-width:95vw;max-height:90vh;overflow-y:auto;padding:2rem;position:relative">
            <button onclick="closeJobModal()"
                style="position:absolute;top:1rem;right:1rem;font-size:1.3rem;color:#6B7280;cursor:pointer">×</button>
            <div id="jobModalContent"></div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>
    <script src="../js/app.js"></script>
    <script>
        const STATUS_OPTS = ['pending', 'confirmed', 'on_the_way', 'arrived', 'active', 'pickup_ready', 'closed'];
        const STATUS_LABELS = { pending: 'Pending', confirmed: 'Confirmed', on_the_way: 'On The Way', arrived: 'Arrived', active: 'Active', pickup_ready: 'Pickup Ready', closed: 'Closed' };
        const STATUS_BADGES = { pending: 'b-pending', confirmed: 'b-confirmed', on_the_way: 'b-way', arrived: 'b-arrived', active: 'b-active', pickup_ready: 'b-pickup', closed: 'b-closed' };

        document.addEventListener('DOMContentLoaded', async () => {
            await seedDatabase();
            if (!Auth.requireAdmin()) return;
            const user = Auth.current();
            document.getElementById('userName').textContent = user.name;
            document.getElementById('userAvatar').textContent = user.name.charAt(0);
            renderTable();
        });

        function renderTable() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const statusF = document.getElementById('statusFilter').value;
            let bookings = DB.get(KEYS.BOOKINGS);
            if (search) bookings = bookings.filter(b => (b.jobNumber + b.agentName + b.address + b.agency).toLowerCase().includes(search));
            if (statusF) bookings = bookings.filter(b => b.status === statusF);
            bookings = bookings.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

            document.getElementById('bookingsTbody').innerHTML = bookings.map(b => {
                const { days, pct, colorClass } = DateUtils.countdown(b.endDate);
                const cdColor = colorClass === 'green' ? 'var(--success)' : colorClass === 'amber' ? 'var(--warning)' : 'var(--danger)';
                return `<tr>
      <td><strong style="color:var(--accent)">${b.jobNumber || '—'}</strong></td>
      <td>${b.agentName}<br><small style="color:var(--text-muted)">${b.agentPhone}</small></td>
      <td>${b.agency || '—'}</td>
      <td style="max-width:200px"><small>${b.address}</small></td>
      <td>${DateUtils.format(b.installDate)}<br><small style="color:var(--text-muted)">${b.installTime || ''}</small></td>
      <td><small>🛏${b.bedrooms} 🚿${b.bathrooms} 🛋${b.livingAreas || 0}</small></td>
      <td>
        <select class="status-select" onchange="updateStatus('${b.id}', this.value)">
          ${STATUS_OPTS.map(s => `<option value="${s}" ${b.status === s ? 'selected' : ''}>${STATUS_LABELS[s]}</option>`).join('')}
        </select>
      </td>
      <td style="min-width:120px">
        ${b.endDate && b.status === 'active' ? `
        <div style="font-size:0.75rem;font-weight:600;color:${cdColor}">${days > 0 ? days + 'd left' : 'Overdue'}</div>
        <div class="cd-bar" style="margin-top:4px;width:100px"><div class="cd-fill ${colorClass.charAt(0)}" style="width:${pct}%"></div></div>
        ` : '—'}
      </td>
      <td>
        <button class="ab ab-outline ab-sm ab-icon" onclick="viewJob('${b.id}')" title="View Details">👁</button>
      </td>
    </tr>`;
            }).join('') || '<tr><td colspan="9" style="text-align:center;padding:2rem;color:var(--text-muted)">No bookings found</td></tr>';
        }

        function updateStatus(id, newStatus) {
            DB.update(KEYS.BOOKINGS, id, { status: newStatus });
            const b = DB.getOne(KEYS.BOOKINGS, id);
            if (newStatus === 'active' && b) {
                const endDate = DateUtils.addDays(new Date().toISOString().slice(0, 10), 42);
                DB.update(KEYS.BOOKINGS, id, { endDate, startDate: new Date().toISOString().slice(0, 10) });
            }
            if (newStatus === 'closed') Inventory.releaseForJob(id);
            logActivity(`Job ${b?.jobNumber} status changed to ${newStatus}`, Auth.current()?.name);
            toast(`Status updated to ${STATUS_LABELS[newStatus]}`, 'success');
            renderTable();
        }

        async function viewJob(id) {
            const b = DB.getOne(KEYS.BOOKINGS, id);
            if (!b) return;
            let lockboxDisplay = '(none)';
            if (b.lockbox) {
                try { lockboxDisplay = await Crypto.decrypt(b.lockbox); } catch { lockboxDisplay = b.lockbox; }
            }
            const smsLogs = DB.query(KEYS.SMS_LOG, s => s.jobNumber === b.jobNumber);
            document.getElementById('jobModalContent').innerHTML = `
    <h3 style="margin-bottom:0.25rem">${b.jobNumber}</h3>
    <div class="b ${STATUS_BADGES[b.status] || 'b-pending'}" style="margin-bottom:1.5rem">${STATUS_LABELS[b.status] || b.status}</div>
    <div class="f-row">
      <div><div class="f-label">Agent</div><div>${b.agentName}</div></div>
      <div><div class="f-label">Agency</div><div>${b.agency}</div></div>
    </div>
    <div class="f-row" style="margin-top:1rem">
      <div><div class="f-label">Phone</div><div>${b.agentPhone}</div></div>
      <div><div class="f-label">Email</div><div>${b.agentEmail}</div></div>
    </div>
    <hr class="divider">
    <div class="f-label" style="margin-bottom:0.35rem">Property Address</div>
    <div style="font-size:0.9rem;margin-bottom:1rem">${b.address}</div>
    <div class="f-row">
      <div><div class="f-label">Install Date</div><div>${DateUtils.format(b.installDate)} at ${b.installTime || '—'}</div></div>
      <div><div class="f-label">End Date</div><div>${DateUtils.format(b.endDate)}</div></div>
    </div>
    <div style="display:flex;gap:1rem;margin-top:1rem;flex-wrap:wrap;font-size:0.85rem">
      <span>🛏 ${b.bedrooms} Bed</span><span>🚿 ${b.bathrooms} Bath</span><span>🛋 ${b.livingAreas || 0} Living</span>
      <span>🍽 ${b.diningAreas || 0} Dining</span>${b.garage ? '<span>🚗 Garage</span>' : ''}${!b.vacant ? '<span style="color:var(--warning)">⚠ Occupied</span>' : '<span>🏠 Vacant</span>'}
    </div>
    <hr class="divider">
    <div class="f-row">
      <div><div class="f-label">🔐 Lockbox Code</div><div style="font-family:monospace;font-size:1rem;background:#F3F4F6;padding:0.5rem 0.875rem;border-radius:6px;display:inline-block">${lockboxDisplay}</div></div>
      <div><div class="f-label">Estimated Price</div><div style="font-size:1.2rem;font-weight:700;color:var(--accent)">${Pricing.format(b.estimatedPrice)}</div></div>
    </div>
    ${b.notes ? `<div style="margin-top:1rem"><div class="f-label">Notes</div><div style="font-size:0.875rem;color:var(--text-muted)">${b.notes}</div></div>` : ''}
    ${smsLogs.length ? `<hr class="divider"><div class="f-label" style="margin-bottom:0.75rem">SMS Log (${smsLogs.length})</div><div style="max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:0.4rem">${smsLogs.slice(-6).map(s => `<div class="sms-bubble ${s.direction === 'inbound' ? 'sms-in' : 'sms-out'}"><small style="opacity:0.7">${s.direction.toUpperCase()} · ${new Date(s.timestamp).toLocaleString('en-AU')}</small><div>${s.body}</div></div>`).join('')}</div>` : ''}
    <div style="display:flex;gap:0.75rem;margin-top:1.5rem">
      <button class="ab ab-danger ab-sm" onclick="closeJobModal()">Close</button>
    </div>`;
            document.getElementById('jobModal').style.display = 'flex';
        }

        function closeJobModal() { document.getElementById('jobModal').style.display = 'none'; }
        document.getElementById('jobModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeJobModal(); });
    </script>
</body>

</html>
