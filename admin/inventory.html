<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory | MSS Admin</title>
    <link rel="stylesheet" href="../css/admin.css">
</head>

<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="sidebar-logo-name">Modern Space Styling</div>
                <div class="sidebar-logo-sub">Admin Panel</div>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-section-label">Main</div>
                <a class="sidebar-link" href="dashboard.html"><span class="sidebar-icon">📊</span> Dashboard</a>
                <a class="sidebar-link" href="bookings.html"><span class="sidebar-icon">📋</span> Bookings</a>
                <a class="sidebar-link" href="photo-bookings.html"><span class="sidebar-icon">📸</span> Photo Bookings</a>
                <a class="sidebar-link active" href="inventory.html"><span class="sidebar-icon">📦</span> Inventory</a>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-section-label">Management</div>
                <a class="sidebar-link" href="pricing.html"><span class="sidebar-icon">💰</span> Pricing</a>
                <a class="sidebar-link" href="sms.html"><span class="sidebar-icon">💬</span> SMS Centre</a>
                <a class="sidebar-link" href="team.html"><span class="sidebar-icon">👥</span> Team Contacts</a>
                <a class="sidebar-link" href="agents.html"><span class="sidebar-icon">🏢</span> Agents</a>
                <a class="sidebar-link" href="logs.html"><span class="sidebar-icon">📝</span> Activity Log</a>
            </div>
            <div class="sidebar-footer">
                <a class="sidebar-link" href="../index.html" style="padding:0"><span class="sidebar-icon">🏠</span> View
                    Website</a>
                <a class="sidebar-link" href="#" onclick="Auth.logout()"
                    style="padding:0;margin-top:0.5rem;color:#F87171"><span class="sidebar-icon">🚪</span> Logout</a>
            </div>
        </aside>
        <header class="topbar">
            <div class="topbar-title">Inventory Management</div>
            <div class="topbar-right">
                <div class="topbar-user">
                    <div class="user-avatar" id="userAvatar">A</div><span id="userName">Admin</span>
                </div>
            </div>
        </header>
        <main class="main-content">

            <!-- KPIs -->
            <div class="kpi-grid" style="grid-template-columns:repeat(3,1fr)" id="invKpi"></div>

            <div class="panel" style="margin-top:1.25rem">
                <div class="panel-header">
                    <span class="panel-title">Stock Levels</span>
                    <button class="ab ab-accent ab-sm" onclick="openAddModal()">+ Add Item</button>
                </div>
                <div class="tbl-wrap">
                    <table class="tbl">
                        <thead>
                            <tr>
                                <th>Item</th>
                                <th>Category</th>
                                <th>Total Qty</th>
                                <th>Available</th>
                                <th>Allocated</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="invTbody"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Edit Modal -->
    <div id="editModal"
        style="position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:2000;display:none;align-items:center;justify-content:center;padding:1.5rem">
        <div style="background:white;border-radius:12px;width:440px;max-width:95vw;padding:2rem;position:relative">
            <button onclick="closeEdit()"
                style="position:absolute;top:1rem;right:1rem;font-size:1.3rem;cursor:pointer">×</button>
            <h4 id="modalTitle" style="margin-bottom:1.5rem">Edit Item</h4>
            <input type="hidden" id="editId">
            <div class="f-group"><label class="f-label">Item Name</label><input type="text" id="editName"
                    class="f-control"></div>
            <div class="f-group"><label class="f-label">Category</label>
                <select id="editCat" class="f-control">
                    <option value="bedroom">Bedroom</option>
                    <option value="lounge">Lounge</option>
                    <option value="dining">Dining</option>
                    <option value="decor">Decor</option>
                    <option value="outdoor">Outdoor</option>
                </select>
            </div>
            <div class="f-row">
                <div class="f-group"><label class="f-label">Total Qty</label><input type="number" id="editTotal"
                        class="f-control" min="0"></div>
                <div class="f-group"><label class="f-label">Available</label><input type="number" id="editAvail"
                        class="f-control" min="0"></div>
            </div>
            <button class="ab ab-accent" style="width:100%;justify-content:center;margin-top:0.5rem"
                onclick="saveEdit()">Save Changes</button>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>
    <script src="../js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await seedDatabase();
            if (!Auth.requireAdmin()) return;
            const u = Auth.current();
            document.getElementById('userName').textContent = u.name;
            document.getElementById('userAvatar').textContent = u.name.charAt(0);
            render();
        });

        function render() {
            const items = Inventory.getAll();
            const total = items.reduce((s, i) => s + i.total, 0);
            const avail = items.reduce((s, i) => s + i.available, 0);
            const low = Inventory.getLowStock().length;
            document.getElementById('invKpi').innerHTML = `
    <div class="kpi-card"><div class="kpi-label">Total Items (All)</div><div class="kpi-value">${total}</div></div>
    <div class="kpi-card success"><div class="kpi-label">Available Now</div><div class="kpi-value">${avail}</div></div>
    <div class="kpi-card ${low ? 'danger' : ''}"><div class="kpi-label">Low Stock Alerts</div><div class="kpi-value">${low}</div></div>`;

            document.getElementById('invTbody').innerHTML = items.map(item => {
                const pct = item.total ? Math.round((item.available / item.total) * 100) : 0;
                const allocated = item.total - item.available;
                const cls = pct <= 20 ? 'low' : pct <= 40 ? 'warn' : 'ok';
                const bCls = pct <= 20 ? 'b-low' : pct <= 40 ? 'b-pickup' : 'b-active';
                const label = pct <= 20 ? '⚠ Low' : pct <= 40 ? 'Medium' : '✓ Good';
                return `<tr>
      <td><strong>${item.name}</strong>
        <div class="inv-bar" style="margin-top:4px;width:120px"><div class="inv-fill ${cls}" style="width:${pct}%"></div></div>
      </td>
      <td><span class="tag">${item.category}</span></td>
      <td style="font-weight:700">${item.total}</td>
      <td style="font-weight:700;color:${cls === 'low' ? 'var(--danger)' : cls === 'warn' ? 'var(--warning)' : 'var(--success)'}">${item.available}</td>
      <td>${allocated}</td>
      <td><span class="b ${bCls}">${label}</span></td>
      <td>
        <button class="ab ab-outline ab-sm" onclick="openEdit('${item.id}')">✏ Edit</button>
        <button class="ab ab-danger ab-sm" onclick="deleteItem('${item.id}')">🗑</button>
      </td>
    </tr>`;
            }).join('') || '<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--text-muted)">No inventory items found</td></tr>';
        }

        function openEdit(id) {
            const item = DB.getOne(KEYS.INVENTORY, id);
            if (!item) return;
            document.getElementById('editId').value = id;
            document.getElementById('editName').value = item.name;
            document.getElementById('editCat').value = item.category;
            document.getElementById('editTotal').value = item.total;
            document.getElementById('editAvail').value = item.available;
            document.getElementById('modalTitle').textContent = 'Edit: ' + item.name;
            document.getElementById('editModal').style.display = 'flex';
        }

        function openAddModal() {
            document.getElementById('editId').value = '';
            document.getElementById('editName').value = '';
            document.getElementById('editTotal').value = '';
            document.getElementById('editAvail').value = '';
            document.getElementById('modalTitle').textContent = 'Add New Item';
            document.getElementById('editModal').style.display = 'flex';
        }

        function closeEdit() { document.getElementById('editModal').style.display = 'none'; }

        function saveEdit() {
            const id = document.getElementById('editId').value;
            const name = document.getElementById('editName').value.trim();
            const cat = document.getElementById('editCat').value;
            const total = parseInt(document.getElementById('editTotal').value) || 0;
            const avail = parseInt(document.getElementById('editAvail').value) || 0;
            if (!name) { toast('Item name required', 'error'); return; }
            if (id) {
                DB.update(KEYS.INVENTORY, id, { name, category: cat, total, available: Math.min(avail, total) });
                logActivity(`Inventory updated: ${name}`, Auth.current()?.name);
                toast('Item updated', 'success');
            } else {
                DB.insert(KEYS.INVENTORY, { name, category: cat, total, available: avail });
                logActivity(`Inventory added: ${name}`, Auth.current()?.name);
                toast('Item added', 'success');
            }
            closeEdit();
            render();
        }

        function deleteItem(id) {
            const item = DB.getOne(KEYS.INVENTORY, id);
            if (!item) return;
            if (!confirm(`Delete "${item.name}"?`)) return;
            DB.delete(KEYS.INVENTORY, id);
            logActivity(`Inventory deleted: ${item.name}`, Auth.current()?.name);
            toast('Item deleted', 'success');
            render();
        }
    </script>
</body>

</html>
