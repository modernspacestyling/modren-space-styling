<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | Modern Space Styling</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="../css/admin.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-name">Modern Space Styling</div>
        <div class="login-logo-sub">Admin Portal</div>
      </div>
      <h2 class="login-title">Welcome back</h2>
      <p class="login-sub">Sign in to the admin dashboard</p>

      <div class="f-group">
        <label class="f-label" for="email">Email Address</label>
        <input type="email" id="email" class="f-control" placeholder="you@example.com" autocomplete="username">
      </div>
      <div class="f-group">
        <label class="f-label" for="password">Password</label>
        <input type="password" id="password" class="f-control" placeholder="Password" autocomplete="current-password">
      </div>

      <div id="loginErr" role="alert" style="color:#DC2626;font-size:0.8rem;margin-bottom:0.75rem;display:none"></div>

      <button class="ab ab-primary w-full" id="loginBtn" type="button"
        style="width:100%;justify-content:center;padding:0.75rem;font-size:0.9rem">Sign In</button>

      <div style="text-align:center;margin-top:1rem;font-size:0.82rem">
        <a href="forgot.html" style="color:var(--accent);font-weight:600;text-decoration:none">Forgot password?</a>
      </div>

      <hr class="divider">
      <p style="text-align:center;font-size:0.75rem;color:var(--text-muted);line-height:1.5">
        Secure login powered by Supabase.<br>
        Works on any device with the same email + password.
      </p>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script src="supabase.min.js"></script>
  <script src="auth-supabase.js"></script>
  <script>
    const emailEl = document.getElementById('email');
    const passEl  = document.getElementById('password');
    const errEl   = document.getElementById('loginErr');
    const btn     = document.getElementById('loginBtn');

    function showErr(msg) {
      errEl.textContent = msg;
      errEl.style.display = 'block';
    }
    function clearErr() {
      errEl.style.display = 'none';
      errEl.textContent = '';
    }
    function setLoading(loading) {
      btn.disabled = loading;
      btn.style.opacity = loading ? '0.6' : '1';
      btn.textContent = loading ? 'Signing in…' : 'Sign In';
    }

    async function doLogin() {
      clearErr();
      const email = emailEl.value.trim();
      const pass  = passEl.value;
      if (!email || !pass) { showErr('Please enter email and password.'); return; }
      setLoading(true);
      try {
        await MSSAuth.signIn(email, pass);
        window.location.href = 'dashboard.html';
      } catch (e) {
        const msg = (e && e.message) ? e.message : 'Login failed. Please try again.';
        showErr(msg.includes('Invalid login') ? 'Invalid email or password.' : msg);
        setLoading(false);
      }
    }

    btn.addEventListener('click', doLogin);
    document.addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });

    // If already signed in, skip login
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const session = await MSSAuth.getSession();
        if (session && session.user) {
          await MSSAuth.syncLegacySession(session.user);
          window.location.href = 'dashboard.html';
        }
      } catch (e) { /* ignore, show login */ }
    });
  </script>
</body>
</html>
